<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Estágio - Diário</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="container">
        <header>
            <h1 id="header-title">Diário de Estágio</h1>
        </header>

        <div class="card">
            <form id="form-atividade">
                <div class="form-group">
                    <label>Atividade desenvolvida</label>
                    <textarea id="atividade" rows="3" required placeholder="O que você fez hoje?"></textarea>
                </div>
                <div class="form-group">
                    <label>Data</label>
                    <input type="date" id="data" required>
                </div>
                <div style="display: flex; gap: 1rem;">
                    <div class="form-group" style="flex: 1;">
                        <label>Turno</label>
                        <select id="turno">
                            <option value="Manhã">Manhã</option>
                            <option value="Tarde">Tarde</option>
                            <option value="Noite">Noite</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;">
                        <label>Horas</label>
                        <input type="number" id="horas" required min="1" max="12" placeholder="Ex: 4">
                    </div>
                </div>
                <button type="submit" class="btn">Salvar Atividade</button>
                <button type="button" class="btn btn-outline" id="btn-sync">Sincronizar ☁️</button>
            </form>
        </div>

        <h3 style="margin: 1.5rem 0 1rem; color: var(--text-light);">Registros Recentes</h3>
        <ul id="lista-atividades" class="lista-registros"></ul>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/db.js"></script>
    <script src="js/sync.js"></script> <script src="js/app.js"></script> </body>
</body>
</html>
